<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activaciones</title>

    <link rel="stylesheet" href="css/styles.css?v=8">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <link rel="apple-touch-icon"
      sizes="180x180"
      href="assets/iconos/icono-activaciones.png">
</head>

<body>

    <main class="container">

        <header class="app-header">
            <img src="assets/logo.png" alt="Logo">
            <h1>REGISTRO DE ACTIVACIONES</h1>
        </header>

        <!-- DATOS GENERALES -->
        <section class="card">

            <h2>Datos generales</h2>

            <div class="campo">
                <label for="cedi">CEDI</label>
                <select id="cedi">
                    <option value="">Seleccionar</option>
                </select>
            </div>

            <div class="campo">
                <label for="activador">Técnico de activación</label>
                <select id="activador">
                    <option value="">Seleccionar</option>
                </select>
            </div>

            <div class="campo">
                <label for="fecha">Fecha activación</label>
                <input type="date" id="fecha">
            </div>

        </section>

        <!-- DATOS DE ACTIVACIÓN -->
        <section class="card">

            <h2>Datos de activación</h2>

            <div class="campo">
                <label for="modelo">Modelo</label>
                <input 
                    type="text" 
                    id="modelo" 
                    list="listaModelos"
                    placeholder="Escribe o selecciona modelo"
                    autocomplete="off">

                <datalist id="listaModelos"></datalist>
            </div>

            <div class="campo">
                <label for="serie">SERIE</label>

                <input 
                    type="text" 
                    id="serie" 
                    autocomplete="off"
                    placeholder="Escanee la serie"
                    readonly>

                <button type="button" 
                class="btn-scan"
                id="btnScanner">

                    <div class="barcode-icon">
                        ||| |||||| ||
                    </div>

                    <span>
                        ESCANEAR SERIE
                    </span>

                </button>

                <div id="confirmacionSerie" class="confirmacion-serie oculto">

                    <p>¿La serie fue registrada correctamente?</p>

                    <div class="confirmacion-botones">
                        <button type="button" id="btnSerieSi">Sí</button>
                        <button type="button" id="btnSerieNo">No</button>
                    </div>

                </div>
            </div>



            <div id="reader" class="reader"></div>

            <div class="campo">
                <label for="to">TO</label>
                <input 
                    type="text" 
                    id="to" 
                    placeholder="Ingresa TO"
                    autocomplete="off">
            </div>

            <div class="campo">
                <label for="litros">Litros gasolina</label>
                <input 
                    type="number" 
                    id="litros" 
                    placeholder="Máximo 20 litros"
                    min="0"
                    max="20"
                    step="1">
            </div>

            <div class="campo">
                <label for="agencia">Agencia</label>
                <select id="agencia">
                    <option value="">Seleccionar</option>
                </select>
            </div>

            <div class="campo">
                <label for="tipoEstructura">Tipo de estructura</label>
                <select id="tipoEstructura">
                    <option value="">Seleccionar</option>
                    <option value="MADERA">MADERA</option>
                    <option value="METAL">METAL</option>
                </select>
            </div>

        </section>

        <!-- MENSAJES -->
        <section class="mensaje" id="mensaje"></section>

        <!-- ACCIONES -->
        <section class="acciones">

            <button id="btnRegistrar" disabled>
                Registrar activación
            </button>

        </section>

    </main>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="js/scanner.js?v=8"></script>
    <script src="js/app.js?v=8"></script>

    <script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service_worker.js");
    });
}
</script>

</body>
</html>
