<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activaciones</title>

    <link rel="stylesheet" href="css/styles.css?v=19">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <link rel="apple-touch-icon"
      sizes="180x180"
      href="assets/iconos/icono-activaciones.png">
</head>

<body>

    <main class="container" id="pantallaFormulario">

        <header class="app-header">

            <div class="menu-wrapper">
                <button id="btnMenu" class="btn-menu" type="button">⋮</button>

                <div id="menuOpciones" class="menu-opciones">
                    <button id="btnHistorial" type="button">Historial</button>
                </div>
            </div>

            <img src="assets/logo.png" alt="Logo">
            <h1>REGISTRO DE ACTIVACIONES</h1>

        </header>

        <!-- DATOS GENERALES -->
        <section class="card">

            <h2>Datos generales</h2>

            <div class="campo">
                <label for="cedi">CEDI</label>
                <select id="cedi">
                    <option value="">Seleccionar</option>
                </select>
            </div>

            <div class="campo">
                <label for="activador">Técnico de activación</label>
                <select id="activador">
                    <option value="">Seleccionar</option>
                </select>
            </div>

            <div class="campo">
                <label for="fecha">Fecha activación</label>
                <input type="date" id="fecha">
            </div>

        </section>

        <!-- DATOS DE ACTIVACIÓN -->
        <section class="card">

            <h2>Datos de activación</h2>

            <div class="campo">
                <label for="modelo">Modelo</label>
                <div class="buscador-wrapper">
                    <input 
                        type="text" 
                        id="modelo" 
                        placeholder="Escribe o selecciona modelo"
                        autocomplete="off">

                    <div id="listaModelos" class="lista-buscador oculto"></div>
                </div>
            </div>

            <div class="campo">
                <label for="serie">SERIE</label>

                <input 
                    type="text" 
                    id="serie" 
                    autocomplete="off"
                    placeholder="Escanee la serie"
                    readonly>

                <button type="button" 
                class="btn-scan"
                id="btnScanner">

                    <div class="barcode-icon">
                        ||| |||||| ||
                    </div>

                    <span>
                        ESCANEAR SERIE
                    </span>

                </button>

                <button type="button" 
                    class="btn-scan btn-vin"
                    id="btnVinOCR">

                        <div class="barcode-icon">
                            VIN
                        </div>

                        <span>
                            LEER VIN
                        </span>

                </button>

                <div id="confirmacionSerie" class="confirmacion-serie oculto">

                    <p>¿La serie fue registrada correctamente?</p>

                    <div class="confirmacion-botones">
                        <button type="button" id="btnSerieSi">Sí</button>
                        <button type="button" id="btnSerieNo">No</button>
                    </div>

                </div>
            </div>



            <div id="reader" class="reader"></div>

            <div class="campo">
                <label for="to">TO / SO</label>
                <input 
                    type="text" 
                    id="to" 
                    placeholder="Ingresa TO/SO"
                    autocomplete="off">
            </div>

            <div class="campo">
                <label for="litros">Litros gasolina</label>
                <input 
                    type="number" 
                    id="litros" 
                    placeholder="Máximo 9 litros"
                    min="0"
                    max="20"
                    step="1">
            </div>

            <div class="campo">
                <label for="agencia">Agencia</label>
                <div class="buscador-wrapper">
                    <input 
                        type="text" 
                        id="agencia" 
                        placeholder="Escribe o selecciona agencia"
                        autocomplete="off">

                    <div id="listaAgencias" class="lista-buscador oculto"></div>
                </div>
            </div>

            <div class="campo">
                <label for="tipoEstructura">Tipo de estructura</label>
                <select id="tipoEstructura">
                    <option value="">Seleccionar</option>
                    <option value="MADERA">MADERA</option>
                    <option value="METAL">METAL</option>
                </select>
            </div>

        </section>

        <!-- MENSAJES -->
        <section class="mensaje" id="mensaje"></section>

        <!-- ACCIONES -->
        <section class="acciones">

            <button id="btnRegistrar" disabled>
                Registrar activación
            </button>

        </section>



    </main>

            <!-- INICIO HISTORIAL -->
        <section id="pantallaHistorial" class="pantalla-historial oculto">

            <div class="historial-header">
                <button type="button" id="btnVolverFormulario" class="btn-volver">
                    ←
                </button>

                <h2>Historial</h2>
            </div>

            <div class="card historial">

                <div class="campo">
                    <label>CEDI</label>
                    <select id="historialCedi"></select>
                </div>

                <div class="campo">
                    <label>Técnico</label>
                    <select id="historialTecnico"></select>
                </div>

                <div class="campo">
                    <label>Periodo</label>
                    <select id="historialPeriodo">
                        <option value="dia">Hoy</option>
                        <option value="semana">Semana actual</option>
                    </select>
                </div>

                <button id="btnBuscarHistorial" class="btn" type="button">
                    Buscar historial
                </button>

                <div id="resultadoHistorial"></div>

            </div>

        </section>
        <!-- FIN HISTORIAL -->

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://unpkg.com/@zxing/browser@latest"></script>
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

    <script src="js/app.js?v=20"></script>
    <script src="js/scanner.js?v=19"></script>

    <script src="js/vinValidator.js?v=2"></script>
    <script src="js/vinScanner.js?v=8"></script>

    

    <script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>

</body>
</html>
